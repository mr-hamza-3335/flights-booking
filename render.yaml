services:
  - type: web
    name: skyrequest-api
    env: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skyrequest-db
          property: connectionString
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: NOTIFICATION_EMAIL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: FRONTEND_URL
        value: https://flights-booking.vercel.app
      - key: FLIGHT_API_KEY
        sync: false

databases:
  - name: skyrequest-db
    databaseName: skyrequest
    plan: free
